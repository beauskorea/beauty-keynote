<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>K-뷰티 키노트 자료 무료 다운로드 | 뷰스컴퍼니</title>
<meta name="description" content="GLOBAL K-BEAUTY CONFERENCE 2026 키노트 핵심 자료를 무료로 받아보세요. 소재부터 글로벌 유통까지, 한눈에 보는 K-뷰티 에코시스템." />
<meta property="og:title" content="K-뷰티 키노트 자료 무료 다운로드 | 뷰스컴퍼니" />
<meta property="og:description" content="조기 매진된 GLOBAL K-BEAUTY CONFERENCE 2026 키노트 핵심 자료. 무료로 받아보세요." />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0f;
    --card: #14141c;
    --line: #26263300;
    --accent: #ff2d78;
    --accent2: #7b5cff;
    --text: #f4f4f7;
    --muted: #9a9aad;
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 0 20px; }
  .hero {
    position: relative;
    padding: 56px 0 40px;
    text-align: center;
    background:
      radial-gradient(120% 80% at 50% 0%, rgba(123,92,255,.28) 0%, rgba(10,10,15,0) 60%),
      radial-gradient(100% 60% at 50% 100%, rgba(255,45,120,.18) 0%, rgba(10,10,15,0) 70%);
  }
  .badge {
    display: inline-block;
    font-size: 12px; font-weight: 700; letter-spacing: .08em;
    color: #fff; background: linear-gradient(90deg, var(--accent), var(--accent2));
    padding: 7px 14px; border-radius: 999px; margin-bottom: 22px;
  }
  .conf {
    font-size: 13px; color: var(--muted); font-weight: 500;
    margin-bottom: 14px; letter-spacing: .02em;
  }
  h1 {
    font-size: 30px; font-weight: 900; line-height: 1.32;
    letter-spacing: -.02em; margin-bottom: 18px;
  }
  h1 .hl {
    background: linear-gradient(90deg, #ff5c9a, #a78bff);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .sub { font-size: 15px; color: var(--muted); margin-bottom: 30px; }
  .speaker {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 13px; color: var(--muted);
    padding: 8px 16px; border: 1px solid #2a2a3a; border-radius: 999px;
    margin-bottom: 34px;
  }
  .speaker b { color: var(--text); font-weight: 700; }
  .cover {
    width: 100%; border-radius: 18px; margin-bottom: 30px;
    border: 1px solid #24243200;
    box-shadow: 0 24px 60px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.04);
    background: linear-gradient(135deg, #1b1b2b, #101019);
    padding: 34px 24px; text-align: left;
  }
  .cover .k {
    font-size: 11px; letter-spacing: .18em; color: #ff5c9a; font-weight: 700; margin-bottom: 10px;
  }
  .cover .t { font-size: 22px; font-weight: 900; line-height: 1.35; margin-bottom: 8px; }
  .cover .d { font-size: 13px; color: var(--muted); }
  .cover .meta { margin-top: 20px; font-size: 12px; color: #6f6f85; border-top: 1px solid #24243a; padding-top: 14px; }
  .bullets { text-align: left; margin: 6px 0 34px; }
  .bullets .lbl { font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 14px; letter-spacing: .02em; }
  .bullets ul { list-style: none; }
  .bullets li {
    position: relative; padding-left: 28px; margin-bottom: 12px; font-size: 15px; color: #dcdce6;
  }
  .bullets li::before {
    content: "✦"; position: absolute; left: 4px; top: 1px; color: var(--accent); font-size: 13px;
  }
  .cta-primary {
    display: block; width: 100%; text-align: center; text-decoration: none;
    font-size: 17px; font-weight: 700; color: #fff;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    padding: 18px; border-radius: 14px; margin-bottom: 14px;
    box-shadow: 0 12px 30px rgba(255,45,120,.32);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .cta-primary:active { transform: translateY(1px) scale(.995); }
  .cta-primary small { display: block; font-size: 12px; font-weight: 500; opacity: .85; margin-top: 3px; }
  .cta-sub {
    display: block; width: 100%; text-align: center; text-decoration: none;
    font-size: 15px; font-weight: 600; color: var(--text);
    background: #191922; border: 1px solid #2c2c3c;
    padding: 15px; border-radius: 14px; margin-bottom: 10px;
    transition: background .12s ease;
  }
  .cta-sub:active { background: #20202c; }
  .cta-sub span { color: var(--accent); }
  .note { font-size: 12px; color: #6f6f85; text-align: center; margin: 8px 0 34px; }
  .subscribe {
    text-align: left; margin-top: 8px;
    background: linear-gradient(160deg, #16161f, #0f0f16);
    border: 1px solid #262636; border-radius: 18px; padding: 28px 22px 24px;
  }
  .subscribe .hb {
    display: inline-block; font-size: 12px; font-weight: 700; color: #ffb3d0;
    background: rgba(255,45,120,.12); border: 1px solid rgba(255,45,120,.3);
    padding: 6px 12px; border-radius: 999px; margin-bottom: 16px;
  }
  .subscribe h2 { font-size: 21px; font-weight: 900; line-height: 1.42; letter-spacing: -.015em; margin-bottom: 12px; }
  .subscribe h2 .hl2 {
    background: linear-gradient(90deg, #ff5c9a, #a78bff);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .subscribe .sp { font-size: 14px; color: var(--muted); margin-bottom: 18px; }
  .hook-list { list-style: none; margin-bottom: 22px; }
  .hook-list li { position: relative; padding-left: 26px; margin-bottom: 10px; font-size: 14px; color: #dcdce6; }
  .hook-list li::before { content: "✓"; position: absolute; left: 2px; top: 0; color: #a78bff; font-weight: 900; }
  .sub-form { display: flex; gap: 8px; margin-top: 4px; }
  .sub-form input {
    flex: 1; min-width: 0; font-family: inherit; font-size: 15px; color: var(--text);
    background: #0d0d14; border: 1px solid #33334a; border-radius: 12px; padding: 15px 16px;
    outline: none; transition: border-color .12s ease;
  }
  .sub-form input::placeholder { color: #6f6f85; }
  .sub-form input:focus { border-color: var(--accent2); }
  .sub-form button {
    flex-shrink: 0; font-family: inherit; font-size: 15px; font-weight: 700; color: #fff; cursor: pointer;
    background: linear-gradient(90deg, var(--accent), var(--accent2)); border: 0; border-radius: 12px; padding: 0 20px;
    transition: transform .12s ease, opacity .12s ease;
  }
  .sub-form button:active { transform: translateY(1px) scale(.99); }
  .sub-form button:disabled { opacity: .55; cursor: default; }
  .sub-msg { font-size: 13px; margin-top: 12px; min-height: 18px; }
  .sub-msg.ok { color: #7ee0a8; }
  .sub-msg.err { color: #ff8fae; }
  .dl-reveal { display: none; margin-top: 16px; }
  .dl-reveal.show { display: block; animation: fadeUp .35s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .divider { height: 1px; background: linear-gradient(90deg, transparent, #2a2a3a, transparent); margin: 8px 0 32px; }
  footer { text-align: center; padding: 24px 0 48px; font-size: 12px; color: #55556a; }
  footer .brand { color: var(--muted); font-weight: 700; letter-spacing: .04em; }
  @media (max-width: 400px) { h1 { font-size: 26px; } .cover .t { font-size: 20px; } }
</style>
</head>
<body>
  <section class="hero">
    <div class="wrap">
      <span class="badge">🔥 무료 자료 공유</span>
      <div class="conf">GLOBAL K-BEAUTY CONFERENCE 2026 · 매일경제 초청 연사</div>
      <h1>K-뷰티 키노트<br /><span class="hl">자료 받기</span></h1>
      <div class="speaker">📌 <b>박진호</b> · 뷰스컴퍼니 대표</div>

      <div class="cover">
        <div class="k">KEYNOTE · 2026.06.16 서울드래곤시티</div>
        <div class="t">K-뷰티 지속성장의 조건</div>
        <div class="d">소재부터 글로벌 유통까지 — 한눈에 보는 에코시스템</div>
      </div>

      <div class="subscribe">
        <span class="hb">✉️ 이메일 남기고 자료 받기</span>
        <h2>이메일만 남기면<br /><span class="hl2">자료 + 매주 인사이트</span></h2>
        <form class="sub-form" id="subForm" novalidate>
          <input type="email" id="subEmail" placeholder="이메일 주소" autocomplete="email" required />
          <button type="submit" id="subBtn">자료 받기</button>
        </form>
        <p class="sub-msg" id="subMsg"></p>
        <div class="dl-reveal" id="dlReveal">
          <a class="cta-primary" href="beauty-marketing-keynote.pdf" download="뷰스컴퍼니_K뷰티_키노트_자료.pdf">
            📥 키노트 자료 다운로드 (PDF)
          </a>
        </div>
      </div>

      <div class="divider"></div>
      <footer>
        <div class="brand">BEAUS COMPANY</div>
        뷰티 브랜드의 글로벌 성장을 만드는 마케팅 파트너
      </footer>
    </div>
  </section>
  <script>
    (function () {
      var form = document.getElementById('subForm');
      var email = document.getElementById('subEmail');
      var btn = document.getElementById('subBtn');
      var msg = document.getElementById('subMsg');
      var reveal = document.getElementById('dlReveal');
      var LIST = 'https://page.stibee.com/api/v1.0/lists/353681';
      var valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      function show(text, cls) { msg.textContent = text; msg.className = 'sub-msg ' + cls; }

      function unlock(auto) {
        reveal.classList.add('show');
        var link = reveal.querySelector('a');
        if (auto) { setTimeout(function () { link.click(); }, 400); }
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var v = email.value.trim();
        if (!valid.test(v)) { show('올바른 이메일 주소를 입력해 주세요.', 'err'); email.focus(); return; }
        btn.disabled = true; btn.textContent = '처리 중…';
        fetch(LIST, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: v })
        })
          .then(function (r) { return r.json().catch(function () { return {}; }); })
          .then(function (d) {
            var code = (d.code || '') + '';
            if (code.indexOf('Succeed') === 0 || (d.httpStatusCode && d.httpStatusCode < 400)) {
              show('구독 완료! 자료를 받아보세요. (확인 메일도 함께 발송했어요)', 'ok');
              unlock(true);
            } else if (code.indexOf('AlreadyExist') > -1 || (d.Message && d.Message.indexOf('이미') > -1)) {
              show('이미 구독 중이에요. 바로 자료를 받아보세요.', 'ok');
              unlock(true);
            } else {
              show(d.message || d.Message || '잠시 후 다시 시도해 주세요.', 'err');
              btn.disabled = false; btn.textContent = '자료 받기';
            }
          })
          .catch(function () {
            show('네트워크 오류입니다. 잠시 후 다시 시도해 주세요.', 'err');
            btn.disabled = false; btn.textContent = '자료 받기';
          });
      });
    })();
  </script>
</body>
</html>
